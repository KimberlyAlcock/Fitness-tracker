<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='src/styles.css') }}">
  </head>
  <body>
    <header>
      <h1 id="title">Fitness Tracker</h1>
    </header>
    <nav>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('crossfit_page') }}">CrossFit</a>
      <a href="{{ url_for('planks_page') }}">Practice Tracker</a>
      <a href="{{ url_for('running_page') }}">Running Program</a>      
    </nav>

    <main>
      <div id="running">
        <h2>Running Program Generator</h2>
        <p>Create a personalized running plan based on your current mileage, goal distance, and race date.</p>
      </div>

      <form id="running-form">
        <label>
          Current weekly mileage:
          <input type="number" id="current-mileage" min="0" step="0.5" value="5" />
        </label>
        <label>
          Goal distance:
          <select id="goal-distance">
            <option>5K</option>
            <option>10K</option>
            <option>Half Marathon</option>
            <option>Marathon</option>
          </select>
        </label>
        <label>
          Race date:
          <input type="date" id="race-date" required />
        </label>
        <label>
          Runs per week (1-4):
          <input type="number" id="runs-per-week" min="1" max="4" value="3" />
        </label>
        <button type="submit" id="generateBtn">Generate Plan</button>
      </form>

      <section id="running-plan"></section>
    </main>

    <script src="{{ url_for('static', filename='src/running.js') }}"></script>
    <footer>
      Fitness Tracker by kimmiegymgym
    </footer>
  </body>
</html>
